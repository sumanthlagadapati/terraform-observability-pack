<svg width="700" height="340" viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="20" y="20" width="180" height="40" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="110" y="45" text-anchor="middle" font-size="14">Terraform plan/state JSON</text>
  <rect x="250" y="20" width="180" height="40" fill="#fffde7" stroke="#fbc02d"/>
  <text x="340" y="45" text-anchor="middle" font-size="14">parse_plan_or_state()</text>
  <rect x="480" y="20" width="180" height="40" fill="#e8f5e9" stroke="#388e3c"/>
  <text x="570" y="45" text-anchor="middle" font-size="14">TerraformResource objects</text>
  <rect x="480" y="90" width="180" height="40" fill="#fce4ec" stroke="#c2185b"/>
  <text x="570" y="115" text-anchor="middle" font-size="14">emit_cloudwatch_alarms()</text>
  <rect x="480" y="160" width="180" height="40" fill="#e1f5fe" stroke="#0288d1"/>
  <text x="570" y="185" text-anchor="middle" font-size="14">emit_prometheus_configs()</text>
  <rect x="480" y="230" width="180" height="40" fill="#ede7f6" stroke="#512da8"/>
  <text x="570" y="255" text-anchor="middle" font-size="14">emit_grafana_dashboards()</text>
  <rect x="250" y="90" width="180" height="40" fill="#fff" stroke="#aaa"/>
  <text x="340" y="115" text-anchor="middle" font-size="13">Custom error classes</text>
  <rect x="250" y="160" width="180" height="40" fill="#fff" stroke="#aaa"/>
  <text x="340" y="185" text-anchor="middle" font-size="13">Type models</text>
  <rect x="480" y="300" width="180" height="30" fill="#fff" stroke="#aaa"/>
  <text x="570" y="320" text-anchor="middle" font-size="12">Customization via alarm_defaults</text>
  <!-- Arrows -->
  <line x1="200" y1="40" x2="250" y2="40" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="40" x2="480" y2="40" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="60" x2="570" y2="90" stroke="#c2185b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="60" x2="570" y2="160" stroke="#0288d1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="60" x2="570" y2="230" stroke="#512da8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="340" y1="60" x2="340" y2="90" stroke="#aaa" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <line x1="340" y1="60" x2="340" y2="160" stroke="#aaa" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="130" x2="570" y2="300" stroke="#aaa" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
